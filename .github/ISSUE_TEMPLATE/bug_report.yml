name: Bug report
description: Report a reproducible integration problem without credentials
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include Cookies, `tgt` values, capture JSON, or complete HTTP requests.
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: 0.3.0
    validations:
      required: true
  - type: input
    id: home_assistant
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove account identifiers, Cookies, tokens, device IDs, and feed IDs.
      render: text
